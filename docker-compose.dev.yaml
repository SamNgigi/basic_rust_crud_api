services:
  # --- App ---------------------
  app:
    container_name: basic-crud-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_NAME=${DB_NAME:-basic_crud_api_dev}
      - DB_USER=${DB_USER:-basic_crud_api}
      - DB_PASSWORD=${DB_PASSWORD:-password12345}
      - DB_HOST=postgres
      - DB_PORT=5432

  # --- PostgreSQL ---------------------
  postgres:
    image: postgres:18-alpine
    container_name: basic-crud-api-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-basic_crud_api_dev}
      POSTGRES_USER: ${DB_USER:-basic_crud_api}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password12345}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-basic_crud_api} -d ${DB_NAME:-basic_crud_api_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pg_data:
    name: basic_crud_api_dev_postgres
