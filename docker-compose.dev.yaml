services:
  # --- PostgreSQL ---------------------
  postgres:
    image: postgres:16-alpine
    container_name: basic-crud-api-dev-db
    restart: unless_stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-basic_crud_api_dev}
      POSTGRES_USER: ${DB_USER:-basic_crud_api}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password12345}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready - U ${DB_USER:-basic_crud_api} -d ${DB_NAME:-basic_crud_api_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pg_data:
    name: basic_crud_api_dev_postgres
